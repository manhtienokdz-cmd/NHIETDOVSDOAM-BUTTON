<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IoT Nhiệt độ & Độ ẩm</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1e1e2f, #111);
      color: white;
    }

    .box {
      text-align: center;
      padding: 40px;
      border-radius: 20px;
      background: #222;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
      width: 320px;
    }

    h2 {
      margin-bottom: 5px;
      opacity: 0.8;
    }

    .value {
      font-size: 50px;
      font-weight: bold;
      margin-bottom: 20px;
    }

    .cold { color: #00bfff; }
    .normal { color: #00ff7f; }
    .hot { color: #ff3b3b; }

    .dry { color: #f1c40f; }
    .humid { color: #3498db; }
    .wet { color: #1e90ff; }

    .btn {
      padding: 12px 25px;
      border: none;
      border-radius: 30px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 15px;
      transition: 0.3s;
    }

    .on {
      background: #00ff7f;
      color: black;
    }

    .off {
      background: #ff3b3b;
      color: white;
    }

    .status {
      margin-top: 10px;
      font-weight: bold;
      font-size: 18px;
    }
  </style>
</head>
<body>

  <div class="box">
    <h2>Nhiệt độ</h2>
    <div id="temp" class="value">30°C</div>

    <h2>Độ ẩm</h2>
    <div id="humi" class="value">60%</div>

    <button id="btn" class="btn off" onclick="toggleLight()">TẮT</button>
    <div id="status" class="status">Đèn: OFF</div>
  </div>

  <script>
    let tempValue = 30;
    let humiValue = 60;
    let isOn = false;

    let tempEl = document.getElementById("temp");
    let humiEl = document.getElementById("humi");
    let btn = document.getElementById("btn");
    let statusEl = document.getElementById("status");

    function updateTemp(temp) {
      tempEl.innerText = temp + "°C";
      tempEl.classList.remove("cold", "normal", "hot");
      if (temp < 20) tempEl.classList.add("cold");
      else if (temp <= 30) tempEl.classList.add("normal");
      else tempEl.classList.add("hot");
    }

    function updateHumi(humi) {
      humiEl.innerText = humi + "%";
      humiEl.classList.remove("dry", "humid", "wet");
      if (humi < 40) humiEl.classList.add("dry");
      else if (humi <= 70) humiEl.classList.add("humid");
      else humiEl.classList.add("wet");
    }

    function toggleLight() {
      isOn = !isOn;
      if (isOn) {
        btn.innerText = "BẬT";
        btn.classList.remove("off");
        btn.classList.add("on");
        statusEl.innerText = "Đèn: ON";
      } else {
        btn.innerText = "TẮT";
        btn.classList.remove("on");
        btn.classList.add("off");
        statusEl.innerText = "Đèn: OFF";
      }
    }

    updateTemp(tempValue);
    updateHumi(humiValue);
  </script>

</body>
</html>
